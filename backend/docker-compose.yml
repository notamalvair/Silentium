version: '3.8'

services:
  # 1. NodeJS Backend Server
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DATABASE_URL=postgresql://messenger_user:messenger_pass@postgres:5432/messenger
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=super_secret_personal_messenger_key_2026
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
    restart: always

  # 2. PostgreSQL DB
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=messenger_user
      - POSTGRES_PASSWORD=messenger_pass
      - POSTGRES_DB=messenger
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U messenger_user -d messenger"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  # 3. Redis Presence Cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

volumes:
  pgdata:
  redisdata:
